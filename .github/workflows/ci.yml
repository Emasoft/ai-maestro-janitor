name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts (monitors)
        run: shellcheck scripts/monitors/*.sh scripts/hooks/*.sh scripts/lib/*.sh

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check (publish.py)
        run: uv run ruff check scripts/publish.py

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Validate plugin (strict)
        run: |
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation --with pyyaml cpv-remote-validate plugin . --strict
          exit_code=$?
          set -e
          if [ $exit_code -eq 0 ]; then
            echo "Validation passed"
            exit 0
          else
            echo "::error::Validation failed (exit code $exit_code)"
            exit $exit_code
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make scripts executable
        run: chmod +x scripts/monitors/*.sh scripts/hooks/*.sh scripts/lib/*.sh

      - name: Syntax check all shell scripts
        run: |
          for f in scripts/monitors/*.sh scripts/hooks/*.sh scripts/lib/*.sh; do
            bash -n "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate monitors.json
        run: |
          jq empty monitors/monitors.json && echo "monitors.json is valid JSON"

      - name: Validate hooks.json
        run: |
          jq empty hooks/hooks.json && echo "hooks.json is valid JSON"
