name: Weekly janitor audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make detector scripts executable
        run: chmod +x scripts/dispatch.sh scripts/detectors/*.sh scripts/hooks/*.sh scripts/lib/*.sh

      - name: Run drift detectors (one-shot)
        id: audit
        env:
          GH_TOKEN: ${{ github.token }}
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}
          CLAUDE_PROJECT_DIR: ${{ github.workspace }}
          CLAUDE_PLUGIN_OPTION_GITHUB_REPO: ${{ github.repository }}
        run: |
          set -o pipefail
          mkdir -p .janitor/state .janitor/logs
          REPORT=$(
            for d in ./scripts/detectors/*.sh; do
              "$d" || true
            done
          )
          printf '%s\n' "$REPORT" | tee audit-report.txt
          if [ -s audit-report.txt ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue if drift found
        if: steps.audit.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Weekly janitor audit found drift ($(date -u +%Y-%m-%d))" \
            --body-file audit-report.txt \
            --label janitor
